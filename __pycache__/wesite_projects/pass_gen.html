<html>
<head>
    <title>Random Password Generator</title>
    <link rel="stylesheet" type="text/css" href="pass_gen.css">
</head>
<body>
    <div class="container">
        <h1>Generate your password</h1>
        <label for="length"><h3>Choose your password Length</h3></label>
        <input type="number" id="length" min="4" max="20" value="12">
        <br>
        <h5><button onclick="generatePassword()">Generate Password</button></h5>
        <div class="password" id="password"></div>
    </div>
   
    <script>
        function generatePassword() 
        {
            const length = document.getElementById('length').value;
            const lengthNum = parseInt(length);
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-+";
            let password = "";
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * charset.length);
                password += charset[randomIndex];
            }
            document.getElementById('password').textContent = password;
            document.getElementById('password').textContent = "Your Generated Password is : " + password;

        }
    </script>
</body>
</html>
